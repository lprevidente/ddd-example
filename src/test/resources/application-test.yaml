spring:
  application:
    name: ddd-example
  # JPA
  jpa:
    hibernate:
      ddl-auto: create

  # Datasource
  datasource:
    password: pass
    username: user
    url: jdbc:h2:mem:db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;
  sql:
    init:
      mode: never
  session:
    jdbc:
      initialize-schema: always
  config:
    activate:
      on-profile: test

# logging
logging:
  level:
    com.lprevidente: TRACE
