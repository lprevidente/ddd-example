# Nome da aplicação
spring.application.name=ddd-example

# H2 Console (opcional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Datasource H2 Embedded em arquivo
spring.datasource.url=jdbc:h2:file:./data/userdb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

logging.level.org.springframework=DEBUG
logging.level.com.lprevidente=DEBUG
